<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - iClinic Management System</title>
    
    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="/assets/css/tailwind.css">
    
    <!-- Google Fonts -->
    <link href="/assets/css/libs/inter-font.css" rel="stylesheet">
    
    <!-- AOS Animation Library -->
    <link href="/assets/css/libs/aos.css" rel="stylesheet">
    
    <!-- Feather Icons (Lucide alternative) -->
    <script src="/assets/js/libs/feather.min.js"></script>
    <script defer src="/assets/js/icon-init.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1e40af;
        }

        body::-webkit-scrollbar {
            width: 10px;
        }

        body::-webkit-scrollbar-track {
            background: transparent;
        }

        body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.35);
            border-radius: 999px;
            border: 2px solid rgba(30, 64, 175, 0.35);
        }

        body::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.55);
        }
        
        /* Glassmorphism effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        /* Blue background with building image */
        .blue-background {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #60a5fa 100%);
            position: relative;
        }
        
        .building-overlay {
            background-image: url('{{ url_for("static", filename="img/New Building.png") }}');
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            opacity: 0.15;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }
        
        .success-animation {
            animation: bounce 0.6s ease-in-out;
        }
        
        .error-animation {
            animation: shake 0.6s ease-in-out;
        }
        
        @keyframes bounce {
            0%, 20%, 53%, 80%, 100% { transform: translate3d(0,0,0); }
            40%, 43% { transform: translate3d(0,-30px,0); }
            70% { transform: translate3d(0,-15px,0); }
            90% { transform: translate3d(0,-4px,0); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }
    </style>
</head>
<body class="min-h-screen blue-background flex items-center justify-center p-4">
    
    <!-- Building Overlay Background -->
    <div class="building-overlay"></div>
    
    <!-- Verification Result Container -->
    <div class="w-full max-w-md relative z-10">
        <!-- Verification Result Card -->
        <div class="glass-card rounded-2xl shadow-2xl p-8 text-center">
        {% if success %}
            <!-- Success State -->
            <div class="success-animation">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-feather="check-circle" class="w-10 h-10 text-green-600"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 mb-4">Email Verified Successfully!</h1>
                <p class="text-gray-600 mb-8 leading-relaxed">{{ message }}</p>
                
                <div class="space-y-4">
                    <a href="/pages/public/login.html" 
                       class="block w-full bg-primary hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition-all duration-300 transform hover:scale-105 shadow-lg hover:shadow-xl">
                        <div class="flex items-center justify-center gap-2">
                            <i data-feather="log-in" class="w-5 h-5"></i>
                            Login to Your Account
                        </div>
                    </a>
                    
                    <a href="/pages/public/landing-page.html" 
                       class="block w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 px-6 rounded-xl transition-all duration-300">
                        <div class="flex items-center justify-center gap-2">
                            <i data-feather="home" class="w-5 h-5"></i>
                            Back to Home
                        </div>
                    </a>
                </div>
            </div>
        {% else %}
            <!-- Error State -->
            <div class="error-animation">
                <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-feather="x" class="w-10 h-10 text-red-600"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 mb-4">Verification Failed</h1>
                <p class="text-gray-600 mb-8 leading-relaxed">{{ message }}</p>
                
                <div class="space-y-4">
                    <a href="/pages/public/login.html" 
                       class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition-all duration-300 transform hover:scale-105 shadow-lg hover:shadow-xl">
                        <div class="flex items-center justify-center gap-2">
                            <i data-feather="user-plus" class="w-5 h-5"></i>
                            Try Registration Again
                        </div>
                    </a>
                    
                    <a href="/pages/public/landing-page.html" 
                       class="block w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 px-6 rounded-xl transition-all duration-300">
                        <div class="flex items-center justify-center gap-2">
                            <i data-feather="home" class="w-5 h-5"></i>
                            Back to Home
                        </div>
                    </a>
                </div>
            </div>
        {% endif %}
        
        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-gray-200">
            <p class="text-sm text-gray-500">
                © 2024 iClinic Management System<br>
                Norzagaray College
            </p>
        </div>
        </div>
    </div>

    
</body>
</html>
