<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - iClinic Management System</title>
    
    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="/assets/css/tailwind.css">
    
    <!-- Google Fonts -->
    <link href="/assets/css/libs/inter-font.css" rel="stylesheet">
    
    <!-- AOS Animation Library -->
    <link href="/assets/css/libs/aos.css" rel="stylesheet">
    
    <!-- Feather Icons (Lucide alternative) -->
    <script src="/assets/js/libs/feather.min.js"></script>
    <script defer src="/assets/js/icon-init.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1e40af;
        }

        body::-webkit-scrollbar {
            width: 10px;
        }

        body::-webkit-scrollbar-track {
            background: transparent;
        }

        body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.35);
            border-radius: 999px;
            border: 2px solid rgba(30, 64, 175, 0.35);
        }

        body::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.55);
        }
        
        /* Glassmorphism effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Blue background with building image */
        .blue-background {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #60a5fa 100%);
            position: relative;
        }
        
        .building-overlay {
            background-image: url('{{ url_for("static", filename="img/New Building.png") }}');
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            opacity: 0.15;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }
        
        /* Floating animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        
        /* Pulse animation */
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.2; }
        }
        
        /* Input focus effects */
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(30, 64, 175, 0.3);
        }
        
        /* Ensure hidden class works properly for password toggle icons */
        .password-toggle-button svg,
        .password-toggle-button i {
            transition: all 0.2s ease;
        }
        
        .password-toggle-button svg.hidden,
        .password-toggle-button i.hidden {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
        }
    </style>
</head>
<body class="min-h-screen blue-background flex items-center justify-center p-4">
    
    <!-- Building Overlay Background -->
    <div class="building-overlay"></div>
    
    <!-- Reset Password Container -->
    <div class="w-full max-w-md relative z-10">
        
        <!-- Back to Login Button -->
        <a href="/login" class="inline-flex items-center gap-2 text-white/80 hover:text-white transition-colors group mb-6">
            <i data-feather="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
            <span class="text-sm font-medium">Back to Login</span>
        </a>
        
        <!-- Reset Password Card -->
        <div class="glass-card rounded-2xl shadow-2xl p-8">
            
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-20 h-20 mx-auto mb-4 flex items-center justify-center">
                    <img src="/assets/img/iclinic-logo.png" alt="iClinic Logo" class="w-18 h-18">
                </div>
                <h2 class="text-xl font-bold gradient-text mb-2">Norzagaray College</h2>
                <p class="text-gray-500 text-sm font-medium mb-3">iClinic Management System</p>
                <h1 class="text-2xl font-bold text-gray-800">Reset Your Password</h1>
                <div class="w-16 h-1 bg-gradient-to-r from-blue-700 to-blue-500 rounded-full mx-auto mt-3"></div>
            </div>
            
            <!-- Success/Error Messages -->
            <div id="messageContainer"></div>
            
            <!-- Reset Password Form -->
            <form id="resetPasswordForm" onsubmit="return false;">
                <!-- New Password -->
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">New Password</label>
                    <div class="relative">
                        <input type="password" id="newPassword" name="newPassword" required
                               minlength="6"
                               class="w-full px-4 py-3 pl-12 pr-12 text-base text-gray-900 bg-white border-2 border-gray-200 rounded-xl focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all duration-300 shadow-sm">
                        <div class="absolute left-4 top-1/2 transform -translate-y-1/2">
                            <i data-feather="lock" class="w-5 h-5 text-gray-400"></i>
                        </div>
                        <button type="button" id="toggleNewPassword" class="password-toggle-button absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-all duration-200 p-2 rounded-lg hover:bg-gray-100">
                            <i data-feather="eye-off" class="w-5 h-5 transition-all duration-200"></i>
                            <i data-feather="eye" class="w-5 h-5 hidden transition-all duration-200"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Confirm Password -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="confirmPassword" name="confirmPassword" required
                               minlength="6"
                               class="w-full px-4 py-3 pl-12 pr-12 text-base text-gray-900 bg-white border-2 border-gray-200 rounded-xl focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all duration-300 shadow-sm">
                        <div class="absolute left-4 top-1/2 transform -translate-y-1/2">
                            <i data-feather="lock" class="w-5 h-5 text-gray-400"></i>
                        </div>
                        <button type="button" id="toggleConfirmPassword" class="password-toggle-button absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-all duration-200 p-2 rounded-lg hover:bg-gray-100">
                            <i data-feather="eye-off" class="w-5 h-5 transition-all duration-200"></i>
                            <i data-feather="eye" class="w-5 h-5 hidden transition-all duration-200"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Security Notice -->
                <div class="mb-6 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                    <div class="flex items-center gap-2 text-blue-800 text-sm">
                        <i data-feather="shield-check" class="w-4 h-4 flex-shrink-0"></i>
                        <span class="font-medium">Password must be at least 6 characters long</span>
                    </div>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="btn-primary w-full py-4 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 text-lg">
                    <div class="flex items-center justify-center gap-2">
                        <i data-feather="check-circle" class="w-5 h-5"></i>
                        Reset Password
                    </div>
                </button>
            </form>
        </div>
    </div>
    
    <script>
        // Wait for DOM to be fully loaded
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Feather icons
            if (typeof feather !== 'undefined') {
                try {
                    feather.replace();
                    
                    // IMPORTANT: Force password toggle icons to correct state after Feather initialization
                    setTimeout(() => {
                        const toggleNewBtn = document.getElementById('toggleNewPassword');
                        const toggleConfirmBtn = document.getElementById('toggleConfirmPassword');
                        
                        if (toggleNewBtn) {
                            const icons = toggleNewBtn.querySelectorAll('svg');
                            if (icons.length >= 2) {
                                icons[0].classList.remove('hidden'); // eye-off
                                icons[1].classList.add('hidden');    // eye
                            }
                        }
                        
                        if (toggleConfirmBtn) {
                            const icons = toggleConfirmBtn.querySelectorAll('svg');
                            if (icons.length >= 2) {
                                icons[0].classList.remove('hidden'); // eye-off
                                icons[1].classList.add('hidden');    // eye
                            }
                        }
                    }, 100);
                } catch (e) {
                    console.log('Feather icons initialization skipped');
                }
            }
            
            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (!token) {
                showMessage('Invalid or missing reset token. Please request a new password reset link.', 'error');
                document.getElementById('resetPasswordForm').style.display = 'none';
                return;
            }
            
            // Password toggle functionality
            function setupPasswordToggle(passwordId, toggleId) {
                const passwordInput = document.getElementById(passwordId);
                const toggleButton = document.getElementById(toggleId);
                
                if (!passwordInput || !toggleButton) return;
                
                // Look for both eye and eye-off icons
                let eyeOffIcon = toggleButton.querySelector('[data-feather="eye-off"]');
                let eyeIcon = toggleButton.querySelector('[data-feather="eye"]');
                
                // If not found by attribute, find by SVG class
                if (!eyeOffIcon) {
                    const svgs = toggleButton.querySelectorAll('svg');
                    eyeOffIcon = svgs[0]; // First icon is eye-off (password hidden)
                    eyeIcon = svgs[1];    // Second icon is eye (password visible)
                }
                
                if (!eyeIcon || !eyeOffIcon) return;
                
                toggleButton.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    const currentType = passwordInput.getAttribute('type');
                    const newType = currentType === 'password' ? 'text' : 'password';
                    
                    // Facebook-style smooth transition
                    passwordInput.style.transition = 'all 0.2s ease';
                    passwordInput.style.opacity = '0.8';
                    
                    setTimeout(() => {
                        passwordInput.setAttribute('type', newType);
                        passwordInput.style.opacity = '1';
                    }, 100);
                    
                    // Update button color and icons
                    if (newType === 'text') {
                        // Password visible - blue eye icon
                        eyeOffIcon.classList.add('hidden');
                        eyeIcon.classList.remove('hidden');
                        toggleButton.classList.add('text-blue-600');
                        toggleButton.classList.remove('text-gray-400');
                    } else {
                        // Password hidden - gray eye-off icon
                        eyeIcon.classList.add('hidden');
                        eyeOffIcon.classList.remove('hidden');
                        toggleButton.classList.remove('text-blue-600');
                        toggleButton.classList.add('text-gray-400');
                    }
                    
                    // Subtle button animation
                    toggleButton.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        toggleButton.style.transform = 'scale(1)';
                    }, 150);
                });
            }
            
            setupPasswordToggle('newPassword', 'toggleNewPassword');
            setupPasswordToggle('confirmPassword', 'toggleConfirmPassword');
            
            // Form submission
            document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                if (newPassword !== confirmPassword) {
                    showMessage('Passwords do not match. Please try again.', 'error');
                    return;
                }
                
                if (newPassword.length < 6) {
                    showMessage('Password must be at least 6 characters long.', 'error');
                    return;
                }
                
                const submitBtn = this.querySelector('button[type="submit"]');
                const originalContent = submitBtn.innerHTML;
                submitBtn.disabled = true;
                submitBtn.innerHTML = `
                    <div class="flex items-center justify-center gap-2">
                        <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                        Resetting Password...
                    </div>
                `;
                
                try {
                    const response = await fetch('/reset-password', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            token: token,
                            newPassword: newPassword
                        })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        showMessage(result.message, 'success');
                        document.getElementById('resetPasswordForm').style.display = 'none';
                        
                        // Redirect to login after 3 seconds
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 3000);
                    } else {
                        showMessage(result.message, 'error');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = originalContent;
                        if (typeof feather !== 'undefined') {
                            try {
                                feather.replace();
                            } catch (e) {
                                console.log('Feather icon restore skipped');
                            }
                        }
                    }
                } catch (error) {
                    console.error('Reset password error:', error);
                    showMessage('Connection error. Please check your internet connection and try again.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalContent;
                    if (typeof feather !== 'undefined') {
                        try {
                            feather.replace();
                        } catch (e) {
                            console.log('Feather icon restore skipped');
                        }
                    }
                }
            });
            
            function showMessage(message, type) {
                const container = document.getElementById('messageContainer');
                const bgColor = type === 'success' ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500';
                const textColor = type === 'success' ? 'text-green-700' : 'text-red-700';
                const iconColor = type === 'success' ? 'text-green-500' : 'text-red-500';
                const icon = type === 'success' ? 'check-circle' : 'alert-circle';
                
                container.innerHTML = `
                    <div class="mb-5 p-4 ${bgColor} border-l-4 rounded-lg">
                        <div class="flex items-start gap-3">
                            <i data-feather="${icon}" class="w-5 h-5 ${iconColor} mt-0.5 flex-shrink-0"></i>
                            <p class="text-sm ${textColor}">${message}</p>
                        </div>
                    </div>
                `;
                if (typeof feather !== 'undefined') {
                    try {
                        feather.replace();
                    } catch (e) {
                        console.log('Feather icon message skipped');
                    }
                }
            }
        });
    </script>
</body>
</html>
