<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-label="iClinic System logo inspired option 1">
  <defs>
    <style>
      .t1{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
    </style>
  </defs>

  <rect width="900" height="320" fill="#ffffff"/>

  <!-- ICON -->
  <g transform="translate(70,44)">
    <!-- Academic cap -->
    <g transform="translate(90,14)">
      <path d="M0 20 80 0 160 20 80 40Z" fill="#0B4B7A"/>
      <path d="M128 26v34" stroke="#0B4B7A" stroke-width="10" stroke-linecap="round"/>
      <circle cx="128" cy="66" r="8" fill="#0B4B7A"/>
      <path d="M42 26c24-16 52-16 76 0" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
    </g>

    <!-- Swoosh ring -->
    <path d="M170 168c-10 34-42 62-84 68-58 8-112-30-120-88-8-58 30-112 88-120 34-5 66 6 88 26" fill="none" stroke="#18A34A" stroke-width="20" stroke-linecap="round"/>
    <path d="M188 112c10 24 12 52 4 78" fill="none" stroke="#0B4B7A" stroke-width="16" stroke-linecap="round" opacity="0.9"/>

    <!-- Human figure -->
    <circle cx="64" cy="120" r="12" fill="#18A34A"/>
    <path d="M46 214c10-34 24-60 54-78 16-10 34-16 54-18" fill="none" stroke="#18A34A" stroke-width="22" stroke-linecap="round"/>

    <!-- Health circle + cross -->
    <g transform="translate(150,176)">
      <circle cx="0" cy="0" r="44" fill="#0B4B7A"/>
      <rect x="-8" y="-22" width="16" height="44" rx="8" fill="#ffffff"/>
      <rect x="-22" y="-8" width="44" height="16" rx="8" fill="#ffffff"/>
    </g>

    <!-- Star accent -->
    <path d="M32 156l5 10 11 2-8 8 2 11-10-5-10 5 2-11-8-8 11-2z" fill="#0B4B7A" opacity="0.9"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(320,118)">
    <text class="t1" x="0" y="70" font-size="72" font-weight="800" fill="#111827" letter-spacing="-1">iClinic System</text>
    <text class="t1" x="2" y="108" font-size="22" font-weight="600" fill="#6B7280">Smart Healthcare for Students</text>
  </g>
</svg>
