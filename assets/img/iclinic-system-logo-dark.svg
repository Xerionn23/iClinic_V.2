<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="iClinic System logo (dark)">
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="brand2" x1="1" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="#0B1220"/>

  <!-- Mark -->
  <g transform="translate(80,72)" filter="url(#soft)">
    <rect x="0" y="0" width="216" height="216" rx="56" fill="#0F172A"/>

    <!-- Tech ring -->
    <g transform="translate(108,108)" fill="none" stroke-linecap="round" stroke-width="12">
      <path d="M62-54A88 88 0 1 0 62 54" stroke="url(#brand2)"/>
      <!-- Circuit ticks -->
      <path d="M-74-6h18" stroke="#60A5FA"/>
      <circle cx="-52" cy="-6" r="4" fill="#60A5FA" stroke="none"/>
      <path d="M74 10h16" stroke="#22C55E"/>
      <circle cx="96" cy="10" r="4" fill="#22C55E" stroke="none"/>
      <path d="M-8 84v16" stroke="#60A5FA"/>
      <circle cx="-8" cy="104" r="4" fill="#60A5FA" stroke="none"/>
    </g>

    <!-- Medical cross -->
    <g transform="translate(108,108)">
      <rect x="-14" y="-68" width="28" height="136" rx="14" fill="#ffffff"/>
      <rect x="-68" y="-14" width="136" height="28" rx="14" fill="#ffffff"/>
    </g>

    <!-- Heartbeat / data line -->
    <path d="M36 128h40l16-34 22 78 22-48h68" fill="none" stroke="url(#brand)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(340,128)">
    <text x="0" y="78" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="86" font-weight="800" fill="#E5E7EB" letter-spacing="-1.2">iClinic <tspan fill="url(#brand)">System</tspan></text>
    <text x="2" y="126" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="26" font-weight="600" fill="#94A3B8">Smart Healthcare for Students</text>
  </g>
</svg>
