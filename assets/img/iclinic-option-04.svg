<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-label="iClinic System logo option 4">
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="brand2" x1="1" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
  </defs>

  <!-- Transparent background for flexibility -->

  <!-- MARK: premium iC monogram + subtle medical/tech cue (no illustration look) -->
  <g transform="translate(120,118)">
    <rect x="0" y="0" width="184" height="184" rx="56" fill="#0B1220"/>

    <!-- Monogram built on arcs (C) + stem (i) -->
    <g transform="translate(92,92)" fill="none" stroke-linecap="round">
      <!-- C arc -->
      <path d="M44-52c-18-14-40-16-60-6-28 14-38 52-20 82 18 30 62 36 92 12" stroke="#ffffff" stroke-width="16"/>
      <!-- inner highlight arc (tech accent) -->
      <path d="M40-38c-14-10-28-10-42-2-18 10-24 34-12 52 12 18 38 22 58 8" stroke="url(#brand2)" stroke-width="10" opacity="0.95"/>

      <!-- i stem -->
      <path d="M-12-34v72" stroke="#ffffff" stroke-width="14"/>
      <circle cx="-12" cy="-54" r="7" fill="url(#brand)" stroke="none"/>

      <!-- micro cross (embedded as negative space feel) -->
      <g transform="translate(34,30)">
        <rect x="-7" y="-18" width="14" height="36" rx="7" fill="#ffffff" opacity="0.9"/>
        <rect x="-18" y="-7" width="36" height="14" rx="7" fill="#ffffff" opacity="0.9"/>
      </g>
    </g>

    <!-- micro data nodes (very subtle) -->
    <circle cx="26" cy="36" r="3.5" fill="#38BDF8" opacity="0.9"/>
    <circle cx="26" cy="56" r="3.5" fill="#22C55E" opacity="0.9"/>
    <path d="M26 40v12" stroke="#94A3B8" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(350,150)">
    <text x="0" y="92" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="108" font-weight="800" fill="#0B1220" letter-spacing="-1.8">iClinic</text>
    <text x="440" y="92" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="108" font-weight="800" fill="url(#brand)" letter-spacing="-1.8">System</text>
    <text x="4" y="146" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="30" font-weight="600" fill="#64748B">Smart Healthcare for Students</text>

    <!-- minimal tech underline -->
    <rect x="4" y="168" width="760" height="6" rx="3" fill="#E2E8F0"/>
    <rect x="4" y="168" width="280" height="6" rx="3" fill="url(#brand)"/>
    <circle cx="292" cy="171" r="5" fill="#38BDF8"/>
  </g>
</svg>
