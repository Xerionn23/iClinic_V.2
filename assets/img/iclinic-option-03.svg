<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-label="iClinic System logo option 3">
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <!-- Transparent background (works on light/dark). Add a rect if you want preview background. -->

  <!-- Minimal badge: i + cross integrated, zero illustrative feel -->
  <g transform="translate(110,122)">
    <rect x="0" y="0" width="176" height="176" rx="52" fill="#0B1220"/>

    <!-- Accent corner (tech cue) -->
    <path d="M132 0h44v44" fill="none" stroke="url(#brand)" stroke-width="10" stroke-linecap="round"/>

    <!-- i stem + dot -->
    <rect x="78" y="56" width="20" height="76" rx="10" fill="#ffffff"/>
    <circle cx="88" cy="40" r="9" fill="url(#brand)"/>

    <!-- micro cross (health cue) -->
    <g transform="translate(56,118)">
      <rect x="-8" y="-22" width="16" height="44" rx="8" fill="#ffffff" opacity="0.95"/>
      <rect x="-22" y="-8" width="44" height="16" rx="8" fill="#ffffff" opacity="0.95"/>
    </g>

    <!-- subtle data nodes -->
    <circle cx="30" cy="40" r="4" fill="#38BDF8" opacity="0.9"/>
    <circle cx="30" cy="64" r="4" fill="#22C55E" opacity="0.9"/>
    <path d="M30 44v16" stroke="#94A3B8" stroke-opacity="0.5" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Wordmark: very corporate, clean -->
  <g transform="translate(340,150)">
    <text x="0" y="92" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="108" font-weight="800" fill="#0B1220" letter-spacing="-1.8">iClinic</text>
    <text x="440" y="92" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="108" font-weight="800" fill="url(#brand)" letter-spacing="-1.8">System</text>

    <text x="4" y="146" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="30" font-weight="600" fill="#64748B">Smart Healthcare for Students</text>

    <!-- thin underline accent -->
    <rect x="4" y="166" width="740" height="6" rx="3" fill="#E2E8F0"/>
    <rect x="4" y="166" width="240" height="6" rx="3" fill="url(#brand)"/>
  </g>
</svg>
