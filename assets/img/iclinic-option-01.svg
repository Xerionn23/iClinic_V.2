<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-label="iClinic System logo option 1">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="brand2" x1="1" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="420" fill="#ffffff"/>

  <!-- MARK (minimal + tech + trust) -->
  <g transform="translate(90,90)">
    <!-- outer tile -->
    <rect x="0" y="0" width="240" height="240" rx="64" fill="url(#bg)"/>

    <!-- tech ring -->
    <g transform="translate(120,120)" fill="none" stroke-linecap="round" stroke-width="12">
      <path d="M74-64A104 104 0 1 0 74 64" stroke="url(#brand2)"/>

      <!-- circuit ticks + nodes -->
      <path d="M-86-10h22" stroke="#60A5FA"/>
      <circle cx="-58" cy="-10" r="4" fill="#60A5FA" stroke="none"/>

      <path d="M86 16h20" stroke="#22C55E"/>
      <circle cx="112" cy="16" r="4" fill="#22C55E" stroke="none"/>

      <path d="M-14 92v18" stroke="#60A5FA"/>
      <circle cx="-14" cy="116" r="4" fill="#60A5FA" stroke="none"/>
    </g>

    <!-- cross (flat, geometric) -->
    <g transform="translate(120,120)">
      <rect x="-16" y="-78" width="32" height="156" rx="16" fill="#ffffff"/>
      <rect x="-78" y="-16" width="156" height="32" rx="16" fill="#ffffff"/>
    </g>

    <!-- heartbeat/data line (subtle, clean) -->
    <path d="M44 142h56l18-38 26 90 26-56h80" fill="none" stroke="url(#brand)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(380,150)">
    <text x="0" y="92" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="104" font-weight="800" fill="#0B1220" letter-spacing="-1.6">
      iClinic <tspan fill="url(#brand)">System</tspan>
    </text>
    <text x="4" y="144" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="30" font-weight="600" fill="#64748B">
      Smart Healthcare for Students
    </text>

    <!-- micro accent line -->
    <rect x="4" y="162" width="640" height="6" rx="3" fill="#E2E8F0"/>
    <rect x="4" y="162" width="260" height="6" rx="3" fill="url(#brand)"/>
  </g>
</svg>
