<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-label="iClinic System logo inspired option 4">
  <defs>
    <style>
      .t1{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
    </style>
  </defs>

  <rect width="900" height="320" fill="#ffffff"/>

  <!-- ICON (compact, ready for favicon) -->
  <g transform="translate(86,62)">
    <!-- circle container -->
    <circle cx="100" cy="120" r="96" fill="#0B4B7A"/>

    <!-- cap in negative space -->
    <path d="M54 56 100 40 146 56 100 72Z" fill="#ffffff"/>
    <path d="M134 60v24" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <circle cx="134" cy="90" r="6" fill="#ffffff"/>

    <!-- green swoosh + person -->
    <path d="M144 108c-10 34-42 60-82 60-48 0-88-40-88-88 0-30 16-58 40-74" fill="none" stroke="#18A34A" stroke-width="16" stroke-linecap="round"/>
    <circle cx="54" cy="108" r="9" fill="#18A34A"/>
    <path d="M42 164c14-36 40-54 78-58" fill="none" stroke="#18A34A" stroke-width="16" stroke-linecap="round"/>

    <!-- cross badge -->
    <g transform="translate(114,140)">
      <circle cx="0" cy="0" r="34" fill="#ffffff"/>
      <path d="M0-16v32" stroke="#0B4B7A" stroke-width="12" stroke-linecap="round"/>
      <path d="M-16 0h32" stroke="#0B4B7A" stroke-width="12" stroke-linecap="round"/>
    </g>

    <!-- star -->
    <path d="M34 124l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(320,118)">
    <text class="t1" x="0" y="70" font-size="72" font-weight="800" fill="#111827" letter-spacing="-1">iClinic System</text>
    <text class="t1" x="2" y="108" font-size="22" font-weight="600" fill="#6B7280">Smart Healthcare for Students</text>
  </g>
</svg>
