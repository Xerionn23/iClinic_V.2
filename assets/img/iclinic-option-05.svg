<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-label="iClinic System logo option 5">
  <defs>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <!-- Wordmark-only (most corporate). Transparent background. -->

  <g transform="translate(120,156)">
    <text x="0" y="92" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="124" font-weight="850" fill="#0B1220" letter-spacing="-2.1">iClinic</text>
    <text x="520" y="92" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="124" font-weight="850" fill="url(#brand)" letter-spacing="-2.1">System</text>

    <text x="6" y="148" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="32" font-weight="600" fill="#64748B">Smart Healthcare for Students</text>

    <!-- Ultra minimal signature line -->
    <rect x="6" y="172" width="980" height="6" rx="3" fill="#E2E8F0"/>
    <rect x="6" y="172" width="320" height="6" rx="3" fill="url(#brand)"/>
  </g>
</svg>
