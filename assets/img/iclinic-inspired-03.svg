<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-label="iClinic System logo inspired option 3">
  <defs>
    <style>
      .t1{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
    </style>
  </defs>

  <rect width="900" height="320" fill="#ffffff"/>

  <!-- ICON (with subtle tech dots) -->
  <g transform="translate(70,44)">
    <!-- cap -->
    <path d="M90 18 170 44 90 70 10 44Z" fill="#0B4B7A"/>
    <path d="M148 50v36" stroke="#0B4B7A" stroke-width="10" stroke-linecap="round"/>
    <circle cx="148" cy="92" r="7" fill="#0B4B7A"/>

    <!-- ring -->
    <path d="M188 160a92 92 0 1 1-24-64" fill="none" stroke="#18A34A" stroke-width="18" stroke-linecap="round"/>
    <!-- tech dots -->
    <circle cx="184" cy="96" r="4" fill="#0B4B7A" opacity="0.9"/>
    <circle cx="204" cy="118" r="4" fill="#18A34A" opacity="0.9"/>
    <path d="M184 96l20 22" stroke="#94A3B8" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round"/>

    <!-- person -->
    <circle cx="62" cy="122" r="11" fill="#18A34A"/>
    <path d="M48 214c14-40 42-64 90-74" fill="none" stroke="#18A34A" stroke-width="20" stroke-linecap="round"/>

    <!-- cross -->
    <g transform="translate(150,178)">
      <circle cx="0" cy="0" r="42" fill="#0B4B7A"/>
      <rect x="-7" y="-21" width="14" height="42" rx="7" fill="#ffffff"/>
      <rect x="-21" y="-7" width="42" height="14" rx="7" fill="#ffffff"/>
    </g>

    <!-- small star -->
    <path d="M24 154l4 8 9 2-6 6 1 9-8-4-8 4 1-9-6-6 9-2z" fill="#0B4B7A"/>
  </g>

  <g transform="translate(320,118)">
    <text class="t1" x="0" y="70" font-size="72" font-weight="800" fill="#111827" letter-spacing="-1">iClinic System</text>
    <text class="t1" x="2" y="108" font-size="22" font-weight="600" fill="#6B7280">Smart Healthcare for Students</text>
  </g>
</svg>
